<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      #ui-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 9999;
        display: flex; flex-direction: column; justify-content: center;
        align-items: center; color: white; font-family: sans-serif;
      }
      button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #2196F3; border: none; color: white; border-radius: 5px; }
    </style>
  </head>
  <body>
    <div id="ui-overlay">
      <button id="start-button">เริ่มใช้งาน (Start)</button>
    </div>

    <audio id="audio-raw" src="voice.mp3" preload="auto" playsinline></audio>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="textModel" src="text_3d.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          src="#textModel" 
          position="0 0 0" 
          rotation="90 0 0" 
          scale="1 1 1"
          animation="property: rotation; to: 90 360 0; dur: 5000; easing: linear; loop: true">
        </a-gltf-model>
      </a-entity>
      
    </a-scene>

    <script>
      const startButton = document.querySelector("#start-button");
      const overlay = document.querySelector("#ui-overlay");
      const sceneEl = document.querySelector("a-scene");
      const arTarget = document.querySelector("#ar-target");
      const myAudio = document.querySelector("#audio-raw");

      startButton.addEventListener('click', () => {
        overlay.style.display = "none";
        
        myAudio.play().then(() => {
            myAudio.pause();
            myAudio.currentTime = 0;
            console.log("Audio is unlocked and ready!");
        }).catch(err => console.log("Unlock error: ", err));

        sceneEl.systems["mindar-image-system"].start();
      });

      arTarget.addEventListener("targetFound", () => {
        console.log("Target Found! Playing 3D Experience...");
        myAudio.play();
      });

      arTarget.addEventListener("targetLost", () => {
        myAudio.pause();
      });
    </script>
  </body>
</html>
