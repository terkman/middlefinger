<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* หน้าจอ Overlay เพื่อขออนุญาตใช้เสียงและกล้อง */
      #ui-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 9999;
        display: flex; flex-direction: column; justify-content: center;
        align-items: center; color: white; font-family: sans-serif;
      }
      button {
        padding: 15px 30px; font-size: 18px; cursor: pointer;
        background: #2196F3; border: none; color: white; border-radius: 5px;
      }
    </style>
  </head>
  
  <body>
    <div id="ui-overlay">
      <h2>AR Experience</h2>
      <p>ส่องภาพเพื่อดูข้อความและฟังเสียง</p>
      <button id="start-button">เริ่มใช้งาน (Start)</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <audio id="ask-voice" src="./voice.mp3" preload="auto"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        
        <a-text id="text-ui" value="How old are you?" 
                color="#FFD700" align="center" width="4" 
                position="0 0 0" 
                background="color: #000; opacity: 0.5"></a-text>

        <a-entity id="sound-entity" sound="src: #ask-voice; loop: false"></a-entity>
      </a-entity>
    </a-scene>

    <script>
      const startButton = document.querySelector("#start-button");
      const overlay = document.querySelector("#ui-overlay");
      const arTarget = document.querySelector("#ar-target");
      const soundEntity = document.querySelector("#sound-entity");

      // เมื่อกดปุ่ม Start
      startButton.addEventListener('click', () => {
        overlay.style.display = "none";
        // ปลุกระบบเสียงให้พร้อมทำงาน (สำหรับ iOS)
        const ctx = new AudioContext();
        ctx.resume();
      });

      // เหตุการณ์เมื่อ "สแกนเจอภาพ" (Target Found)
      arTarget.addEventListener("targetFound", () => {
        console.log("พบภาพ! เริ่มเล่นเสียงและแสดงข้อความ");
        soundEntity.components.sound.playSound(); // เล่นเสียง
      });

      // เหตุการณ์เมื่อ "ภาพหลุดจากกล้อง" (Target Lost)
      arTarget.addEventListener("targetLost", () => {
        console.log("ภาพหลุดจากกล้อง");
        soundEntity.components.sound.stopSound(); // หยุดเสียง
      });
    </script>
  </body>
</html>
